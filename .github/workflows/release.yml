name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM
            os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: Hijessy-macos-arm64.zip
          - name: macOS Intel
            os: macos-13
            target: x86_64-apple-darwin
            artifact_name: Hijessy-macos-x64.zip
          - name: Windows x64
            os: windows-latest
            artifact_name: Hijessy-windows-x64.zip
          - name: Linux x64
            os: ubuntu-latest
            artifact_name: Hijessy-linux-x64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev \
            libpipewire-0.3-dev libdbus-1-dev libclang-dev \
            libegl1-mesa-dev libgl-dev

      # ── macOS ───────────────────────────────────────────────────────────────

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package macOS .app
        if: runner.os == 'macOS'
        run: |
          BINARY=target/${{ matrix.target }}/release/hijessy
          APP=Hijessy.app
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp "$BINARY" "$APP/Contents/MacOS/hijessy"
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>hijessy</string>
              <key>CFBundleIdentifier</key>
              <string>com.doswind.hijessy</string>
              <key>CFBundleName</key>
              <string>Hijessy</string>
              <key>CFBundleDisplayName</key>
              <string>Hijessy</string>
              <key>CFBundleVersion</key>
              <string>${{ github.ref_name }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ github.ref_name }}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSUIElement</key>
              <true/>
              <key>NSScreenCaptureUsageDescription</key>
              <string>Hijessy 需要屏幕录制权限才能截图。</string>
          </dict>
          </plist>
          PLIST
          zip -r "${{ matrix.artifact_name }}" "$APP"

      # ── Linux ─────────────────────────────────────────────────────────────

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cargo build --release

      - name: Package Linux tar.gz
        if: runner.os == 'Linux'
        run: |
          mkdir -p hijessy-linux
          cp target/release/hijessy hijessy-linux/
          cp README.md hijessy-linux/
          tar -czf "${{ matrix.artifact_name }}" hijessy-linux/

      # ── Windows ─────────────────────────────────────────────────────────────

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release

      - name: Package Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path hijessy-windows -Force
          Copy-Item target\release\hijessy.exe hijessy-windows\Hijessy.exe
          Copy-Item README.md hijessy-windows\
          Compress-Archive -Path hijessy-windows\* -DestinationPath "${{ matrix.artifact_name }}"

      # ── Upload ──────────────────────────────────────────────────────────────

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  publish:
    name: Publish GitHub Release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Hijessy ${{ github.ref_name }}
          body: |
            ## 下载安装

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS (Apple Silicon) | `Hijessy-macos-arm64.zip` | M1/M2/M3 Mac，解压后将 `Hijessy.app` 拖入 `Applications` |
            | macOS (Intel) | `Hijessy-macos-x64.zip` | Intel Mac，同上 |
            | Windows | `Hijessy-windows-x64.zip` | 解压后双击 `Hijessy.exe` 运行 |
            | Linux | `Hijessy-linux-x64.tar.gz` | 解压后运行 `./hijessy` |

            **macOS 首次运行**：需在「系统设置 → 隐私与安全性 → 屏幕录制」中授权 Hijessy。

            **Windows**：如果 SmartScreen 弹出警告，点击「仍要运行」即可，因为程序暂未签名。
          files: |
            Hijessy-macos-arm64.zip
            Hijessy-macos-x64.zip
            Hijessy-windows-x64.zip
            Hijessy-linux-x64.tar.gz
